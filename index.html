<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메이플랜드 도감작 체크리스트</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍁</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');

    :root {
      --brown:  #7a4a1e;
      --gold:   #f5a623;
      --green:  #4caf50;
      --red:    #e53935;
      --gray:   #9e9e9e;
      --dark:   #3e2a10;
      --panel:  #fffbf0;
      --border: #c8a86b;
      --shadow: rgba(122,74,30,.2);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #2c1a0e url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");
      min-height: 100vh;
      color: var(--dark);
    }

    /* ─ Header ─ */
    header {
      background: linear-gradient(135deg,#5c3310,#8b5e3c,#5c3310);
      border-bottom: 3px solid var(--gold);
      padding: 14px 24px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,.5);
      position: sticky; top: 0; z-index: 100;
    }
    header h1 { color: var(--gold); font-size:1.4rem; font-weight:700; text-shadow:1px 1px 3px rgba(0,0,0,.6); }
    header .sub { color:#d4b483; font-size:.75rem; margin-top:2px; }

    /* ─ Layout ─ */
    .container { max-width:980px; margin:0 auto; padding:20px 16px; }

    .panel {
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      box-shadow: 0 4px 16px var(--shadow);
      margin-bottom: 16px;
    }
    .ptitle {
      font-size:.7rem; font-weight:700; color:var(--brown);
      text-transform:uppercase; letter-spacing:1px;
      margin-bottom:10px;
      display:flex; align-items:center; gap:6px;
    }
    .ptitle::before {
      content:''; display:inline-block;
      width:3px; height:13px; background:var(--gold); border-radius:2px;
    }

    /* ─ Search ─ */
    .search-row { display:flex; gap:8px; }
    .search-row input, .id-row input {
      flex:1; padding:9px 14px;
      border:2px solid var(--border); border-radius:8px;
      font-family:inherit; font-size:.85rem; background:white; color:var(--dark);
      outline:none; transition:border-color .15s;
    }
    .search-row input:focus, .id-row input:focus { border-color:var(--gold); }
    .search-row input::placeholder, .id-row input::placeholder { color:var(--gray); }
    .id-row { display:flex; gap:8px; margin-top:8px; }

    .btn {
      padding:8px 18px;
      background:linear-gradient(135deg,#f5a623,#e08800);
      border:none; border-radius:8px;
      color:white; font-family:inherit; font-size:.85rem; font-weight:700;
      cursor:pointer; transition:all .15s;
      text-shadow:0 1px 2px rgba(0,0,0,.3);
      box-shadow:0 2px 6px rgba(245,166,35,.4);
      white-space:nowrap;
    }
    .btn:hover { filter:brightness(1.1); transform:translateY(-1px); }
    .btn.danger { background:linear-gradient(135deg,#e53935,#b71c1c); box-shadow:0 2px 6px rgba(229,57,53,.4); }
    .btn.sm { padding:5px 12px; font-size:.75rem; }

    .msg { font-size:.78rem; color:var(--gray); margin-top:6px; min-height:16px; }
    .msg.err { color:var(--red); }

    /* ─ Monster grid ─ */
    .mob-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(100px,1fr));
      gap:8px; margin-top:4px;
    }
    .mob-card {
      background:white; border:2px solid var(--border); border-radius:10px;
      padding:10px 6px; text-align:center; cursor:pointer;
      transition:all .15s; position:relative;
    }
    .mob-card:hover { border-color:var(--gold); transform:translateY(-2px); box-shadow:0 4px 12px var(--shadow); }
    .mob-card.sel { border-color:var(--gold); background:#fffbe8; box-shadow:0 0 0 3px rgba(245,166,35,.3); }
    .mob-card.sel::after { content:'✓'; position:absolute; top:4px; right:6px; font-size:.65rem; color:var(--gold); font-weight:700; }
    .mob-card img { width:44px; height:44px; object-fit:contain; image-rendering:pixelated; display:block; margin:0 auto 5px; }
    .mob-card .mn { font-size:.74rem; font-weight:700; color:var(--dark); line-height:1.2; }
    .mob-card .ml { font-size:.65rem; color:var(--gray); margin-top:1px; }

    /* ─ Checklist section ─ */
    #section-checklist { display:none; }

    /* ─ Tabs ─ */
    .tab-bar {
      display:flex; gap:6px; margin-bottom:-1px; padding:0 4px;
    }
    .tab-btn {
      display:flex; align-items:center; gap:6px;
      padding:7px 14px; border-radius:8px 8px 0 0;
      border:1px solid var(--border); border-bottom:none;
      background:#f5e8c8; color:var(--brown); font-size:.78rem;
      cursor:pointer; transition:background .15s;
      font-family:inherit; font-weight:500;
    }
    .tab-btn.active { background:var(--panel); color:var(--dark); font-weight:700; }
    .tab-btn .tab-sync-dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:#1a6fa8; margin-left:3px; vertical-align:middle; box-shadow:0 0 0 2px rgba(26,111,168,.25); }
    .tab-btn img { width:24px; height:24px; object-fit:contain; image-rendering:pixelated; }
    .tab-btn .tab-close {
      margin-left:2px; color:#bbb; font-size:.9rem; line-height:1;
      padding:0 2px; border-radius:3px;
    }
    .tab-btn .tab-close:hover { color:var(--red); background:#fee; }
    .tab-add {
      padding:7px 12px; border-radius:8px 8px 0 0;
      border:1px dashed var(--border); border-bottom:none;
      background:transparent; color:var(--border); font-size:1rem;
      cursor:pointer; transition:color .15s, background .15s;
      font-family:inherit;
    }
    .tab-add:hover { color:var(--brown); background:#f5e8c8; }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    /* ─ Monster bar ─ */
    .mob-bar {
      display:flex; align-items:center; gap:14px; padding:14px 18px;
      border-radius:12px;
    }
    .mob-bar img { width:56px; height:56px; object-fit:contain; image-rendering:pixelated; background:white; border:2px solid var(--border); border-radius:8px; padding:3px; flex-shrink:0; }
    .mob-bar .info h2 { font-size:1.2rem; font-weight:700; color:var(--dark); }
    .mob-bar .info .stats { font-size:.76rem; color:var(--gray); margin-top:2px; }
    .mob-bar .info a { font-size:.72rem; color:var(--brown); text-decoration:none; }
    .mob-bar .info a:hover { text-decoration:underline; }
    .mob-bar .actions { margin-left:auto; display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }

    /* ─ Progress ─ */
    .prog-label { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; }
    .prog-label .cnt { font-size:.95rem; font-weight:700; color:var(--brown); }
    .prog-label .pct { font-size:.78rem; color:var(--gray); }
    .prog-bg { height:14px; background:#e8d9b8; border-radius:7px; overflow:hidden; border:1px solid var(--border); }
    .prog-fill { height:100%; background:linear-gradient(90deg,#f5a623,#4caf50); border-radius:7px; transition:width .4s ease; }
    .complete-badge { display:none; text-align:center; padding:10px; background:linear-gradient(135deg,#e8f5e9,#c8e6c9); border:2px solid #4caf50; border-radius:8px; color:#2e7d32; font-weight:700; font-size:.9rem; margin-top:10px; }

    /* ─ 메소 비 ─ */
    #meso-rain { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:9999; overflow:hidden; }
    .meso-coin {
      position:absolute; top:-60px;
      width:22px; height:22px; border-radius:50%;
      background: radial-gradient(circle at 35% 35%, #ffe066, #f5a623 55%, #b8720a);
      border: 2px solid #e69a00;
      box-shadow: 0 2px 6px rgba(0,0,0,.35), inset 0 1px 2px rgba(255,255,200,.6);
      animation: mesoFall linear forwards;
      user-select:none; pointer-events:none;
    }
    .meso-coin::after {
      content:'₩'; display:block; text-align:center;
      font-size:.68rem; font-weight:900; color:#7a4800;
      line-height:18px;
    }
    @keyframes mesoFall {
      0%   { transform: translateY(0) rotate(0deg) scale(1); opacity:1; }
      80%  { opacity:1; }
      100% { transform: translateY(110vh) rotate(720deg) scale(.7); opacity:0; }
    }
    .sw-log-entry.complete { background:#fff9e6; border-left:3px solid #f5a623; font-weight:700; color:#7a4a1e; }

    /* ─ Main layout (items + stopwatch) ─ */
    .main-layout { display:flex; gap:16px; align-items:flex-start; }
    .items-section { flex:1; min-width:0; }
    .sw-section { width:195px; flex-shrink:0; position:sticky; top:68px; }

    /* ─ Item grid ─ */
    .item-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(105px,1fr));
      gap:10px;
    }

    /* ─ Item card ─ */
    .item-card {
      border-radius:10px; border:2px solid; overflow:hidden;
      cursor:pointer; transition:all .2s ease; position:relative;
      user-select:none;
    }

    /* ── NOT FOUND (dark/silhouette) ── */
    .item-card.nf {
      background:#1c1c1c; border-color:#383838;
    }
    .item-card.nf:hover { background:#242424; border-color:#555; }
    .item-card.nf .icon-wrap { background:#141414; }
    .item-card.nf .icon-wrap img { filter:brightness(.3) saturate(.2); }
    .item-card.nf .cn { color:#555; }
    .item-card.nf .cname { color:#777; }
    .item-card.nf .crate { color:#666; }
    .item-card.nf .ccnt { color:#666; }
    .item-card.nf .ctime { color:#555; }

    /* ── FOUND ── */
    .item-card.fd {
      background:white; border-color:var(--border);
    }
    .item-card.fd:hover { border-color:var(--gold); transform:translateY(-2px); box-shadow:0 4px 14px var(--shadow); }
    .item-card.fd .icon-wrap { background:#f5f0e8; }
    .item-card.fd .icon-wrap img { filter:none; }
    .item-card.fd .cname { color:var(--dark); }
    .item-card.fd .crate { color:var(--gray); }
    .item-card.fd .ccnt { color:var(--green); font-weight:700; }
    .item-card.fd .ctime { color:var(--gold); font-weight:500; }

    .item-card .icon-wrap {
      height:68px; display:flex; align-items:center; justify-content:center;
      position:relative;
    }
    .item-card .icon-wrap img {
      width:46px; height:46px; object-fit:contain; image-rendering:pixelated;
      transition:filter .3s;
    }

    /* count badge (top-right) */
    .item-card .cn {
      position:absolute; top:4px; right:5px;
      background:var(--gold); color:white;
      font-size:.6rem; font-weight:700;
      padding:1px 5px; border-radius:10px; min-width:17px; text-align:center;
    }

    .item-card .card-body { padding:6px 7px 8px; }
    .item-card .cname { font-size:.7rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:4px; transition:color .2s; }
    .item-card .crate { font-size:.6rem; line-height:1.6; transition:color .2s; }
    .item-card .ccnt  { font-size:.6rem; line-height:1.6; transition:color .2s; }
    .item-card .ctime { font-size:.6rem; line-height:1.6; transition:color .2s; height:1em; }

    /* decrement button */
    /* decrement button (위) */
    .item-card .decr {
      position:absolute; bottom:26px; right:5px;
      width:17px; height:17px; border-radius:50%;
      border:none; background:rgba(200,200,200,.6); color:#555;
      font-size:.7rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      opacity:0; transition:opacity .15s, background .15s;
      pointer-events:auto;
    }
    .item-card:hover .decr { opacity:1; }
    .item-card .decr:hover { background:var(--red); color:white; }
    .item-card.nf .decr { display:none; }

    /* bulk button (아래) */
    .item-card .bulk-btn {
      position:absolute; bottom:5px; right:5px;
      width:17px; height:17px; border-radius:50%;
      border:none; background:rgba(200,200,200,.6); color:#555;
      font-size:.6rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      opacity:0; transition:opacity .15s, background .15s;
      pointer-events:auto; line-height:1;
    }
    .item-card:hover .bulk-btn { opacity:1; }
    .item-card .bulk-btn:hover { background:#1a6fa8; color:white; }
    .item-card.nf .bulk-btn { display:none; }
    .item-card.excl .bulk-btn { display:none; }

    /* exclude button */
    .item-card .excl-btn {
      position:absolute; top:5px; left:5px;
      width:17px; height:17px; border-radius:50%;
      border:none; background:rgba(200,200,200,.6); color:#555;
      font-size:.65rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      opacity:0; transition:opacity .15s, background .15s;
    }
    .item-card:hover .excl-btn { opacity:1; }
    .item-card .excl-btn:hover { background:#9e9e9e; color:white; }

    /* excluded state */
    .item-card.excl {
      background:#1a1014; border-color:#2a1a20;
      opacity:.55;
    }
    .item-card.excl .icon-wrap { background:#110a0d; }
    .item-card.excl .icon-wrap img { filter:brightness(.08) saturate(0); }
    .item-card.excl .cname { color:#4a3030; text-decoration:line-through; }
    .item-card.excl .crate,.item-card.excl .ccnt,.item-card.excl .ctime { color:#3a2020; }
    .item-card.excl .excl-btn { opacity:1; background:rgba(180,60,60,.5); color:#ffaaaa; }
    .item-card.excl .excl-btn:hover { background:var(--red); color:white; }
    .item-card.excl .decr { display:none; }

    /* 제외 토글 버튼 */
    .excl-toggle {
      display:inline-flex; align-items:center; gap:5px;
      padding:5px 10px; border-radius:8px; border:1.5px solid var(--border);
      background:white; font-family:inherit; font-size:.75rem;
      color:var(--gray); cursor:pointer; transition:all .15s; margin-bottom:10px;
    }
    .excl-toggle:hover { border-color:var(--gold); color:var(--brown); }
    .excl-toggle.hide-excl { background:#fff0f0; border-color:#f5c6c6; color:var(--red); }

    /* ─ Hunt Estimate ─ */
    .hunt-count {
      font-size:1.5rem; font-weight:700; color:var(--dark);
      text-align:center; letter-spacing:-.5px; padding:4px 0 2px;
    }
    .hunt-reason {
      font-size:.65rem; color:var(--gray); text-align:center;
      line-height:1.4; padding-bottom:2px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }

    /* ─ Stopwatch ─ */
    .sw-display {
      font-family:'Courier New',monospace;
      font-size:1.5rem; font-weight:700; color:var(--dark);
      text-align:center; letter-spacing:-.5px;
      padding:10px 0 14px;
      font-variant-numeric:tabular-nums;
    }
    .sw-btns { display:flex; flex-direction:column; gap:8px; }
    .sw-btn {
      padding:9px; border:none; border-radius:8px;
      font-family:inherit; font-size:.85rem; font-weight:700;
      cursor:pointer; transition:all .15s; text-align:center;
    }
    .sw-btn:hover { filter:brightness(1.1); transform:translateY(-1px); }
    .sw-start { background:#4caf50; color:white; }
    .sw-pause { background:#f5a623; color:white; }
    .sw-reset { background:#e0e0e0; color:#555; }
    .sw-channel { background:#e8f4fd; color:#1a6fa8; font-size:.8rem; }
    .sw-sync { background:#e8f4fd; color:#1a6fa8; border:1px solid #a8d4f0; font-size:.72rem; padding:6px 10px; border-radius:8px; cursor:pointer; display:none; }
    .sw-sync.sw-sync-on { background:#1a6fa8; color:#fff; border-color:#1a6fa8; }

    /* sw log */
    .sw-log { margin-top:14px; }
    .sw-log-list { max-height:220px; overflow-y:auto; margin-top:6px; }
    .sw-log-entry {
      display:flex; align-items:baseline; gap:6px;
      font-size:.68rem; padding:4px 6px; border-radius:6px;
      background:white; margin-bottom:4px; border:1px solid #eee;
    }
    .sw-log-entry .lt { color:var(--gold); font-weight:700; font-family:'Courier New',monospace; flex-shrink:0; }
    .sw-log-entry .ln { color:var(--dark); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; }
    .sw-log-entry .ldel { margin-left:auto; flex-shrink:0; background:none; border:none; cursor:pointer; color:#bbb; font-size:.75rem; padding:0 2px; line-height:1; }
    .sw-log-entry .ldel:hover { color:#e55; }
    .sw-log-list::-webkit-scrollbar { width:4px; }
    .sw-log-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

    /* ─ Saves ─ */
    .saves-wrap { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; margin-top:6px; }
    .save-card {
      position:relative; background:white; border:2px solid var(--border);
      border-radius:12px; padding:12px 10px 10px; cursor:pointer;
      transition:all .15s; text-align:center;
    }
    .save-card:hover { border-color:var(--gold); box-shadow:0 2px 8px rgba(0,0,0,.08); }
    .save-card.act { border-color:var(--gold); background:#fffbe8; }
    .save-card.complete { border-color:#4caf50; background:#f1fff3; }
    .save-card-name {
      font-size:.78rem; font-weight:700; color:var(--dark);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:8px;
    }
    .save-card-pct {
      font-size:1.6rem; font-weight:900; line-height:1;
      color:var(--gold); margin-bottom:4px;
    }
    .save-card.complete .save-card-pct { color:#4caf50; }
    .save-card-count { font-size:.65rem; color:var(--gray); margin-bottom:8px; }
    .save-card-bar-bg {
      height:6px; background:#eee; border-radius:3px; overflow:hidden;
    }
    .save-card-bar-fill {
      height:100%; border-radius:3px;
      background:linear-gradient(90deg,#f5a623,#e8890a);
      transition:width .3s;
    }
    .save-card.complete .save-card-bar-fill { background:linear-gradient(90deg,#66bb6a,#43a047); }
    .save-card-del {
      position:absolute; top:6px; right:8px;
      background:none; border:none; color:#ccc; font-size:.7rem;
      cursor:pointer; padding:0; line-height:1;
    }
    .save-card-del:hover { color:var(--red); }
    .no-saves { font-size:.8rem; color:var(--gray); }

    /* ─ Timeline ─ */
    .tl-rows { margin-top:4px; }
    .tl-row { position:relative; margin-bottom:2px; }
    .tl-callouts { position:relative; min-height:0; }
    .tl-bar-zone { position:relative; }
    .tl-callout { position:absolute; transform:translateX(-50%); }
    .tl-callout-box {
      position:relative; width:28px; height:28px;
      border:2px solid #aaa; border-radius:5px;
      background:white; overflow:hidden;
      box-shadow:0 1px 3px rgba(0,0,0,.15);
    }
    .tl-callout-box img { width:20px; height:20px; object-fit:contain; image-rendering:pixelated; display:block; margin:2px auto; }
    .tl-arrow { width:0; height:0; border-left:3px solid transparent; border-right:3px solid transparent; border-top:4px solid #aaa; margin:0 auto; }
    .tl-arrow-spacer { height:4px; }
    .tl-r0 { border-color:#3498db; }
    .tl-r1 { border-color:#2ecc71; box-shadow:0 1px 4px rgba(46,204,113,.3); }
    .tl-r2 { border-color:#f1c40f; box-shadow:0 1px 4px rgba(241,196,15,.3); }
    .tl-r3 { border-color:#e67e22; box-shadow:0 1px 5px rgba(230,126,34,.4); }
    .tl-r4 { border-color:#e74c3c; box-shadow:0 1px 5px rgba(231,76,60,.4); }
    .tl-r5 { border-color:#9b59b6; box-shadow:0 1px 5px rgba(155,89,182,.45); }
    .tl-bar-wrap { position:relative; height:8px; border-radius:4px; background:#ececec; overflow:hidden; }
    .tl-bar-fill { height:100%; border-radius:4px; transition:width 1s linear; }
    .tl-bar-label { position:absolute; top:0; height:100%; display:flex; align-items:center; justify-content:space-between; width:100%; padding:0 4px; pointer-events:none; }
    .tl-bar-label span { font-size:.38rem; color:rgba(255,255,255,.75); font-weight:700; line-height:1; z-index:1; }
    .tl-cluster { position:absolute; bottom:0; transform:translateX(-50%); width:28px; height:34px; cursor:pointer; }
    .tl-callout-wrap { position:absolute; bottom:0; left:0; transform-origin:bottom center; transition:transform .25s ease; }
    .tl-cluster .tl-extra { display:none; }
    .tl-cluster.open .tl-extra { display:flex; flex-direction:column; }

    .rb-green  { background:#e8f8e8; color:#1a7a1a; }
    .rb-yellow { background:#fff8e1; color:#996600; }

  get() { return activeTab().mob; },
  set(v) { activeTab().mob = v; }
});

// ══════════════════════════════════════════
// 3. 스토리지
// ══════════════════════════════════════════
const S_KEY = 'maple_dogam_v2';

function loadS()    { try{return JSON.parse(localStorage.getItem(S_KEY))||{};}catch{return{};} }
function saveS(d)   { try{localStorage.setItem(S_KEY, JSON.stringify(d));}catch(e){console.warn('저장 실패(용량 초과?):',e);} }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ══════════════════════════════════════════
// 4. 스톱워치 (탭별)
// ══════════════════════════════════════════
function swOf(tab) { return tab.sw; }

function swElapsed(tab) {
  tab = tab || activeTab();
  const sw = swOf(tab);
  return sw.startTs !== null ? sw.base + (Date.now() - sw.startTs) : sw.base;
}

function _swStartOne(tab, panel) {
  if (tab.sw.startTs !== null) return;
  tab.sw.startTs = Date.now();
  const tabRef = tab;
  tab.sw.ticker = setInterval(() => swTickPanel(getPanelOf(tabRef.idx), tabRef), 50);
  if (panel) {
    panel.querySelector('.sw-toggle').textContent = '⏸ 일시정지';
    panel.querySelector('.sw-toggle').className = 'sw-btn sw-pause sw-toggle';
  }
}

function _swPauseOne(tab, panel) {
  if (tab.sw.startTs === null) return;
  tab.sw.base += Date.now() - tab.sw.startTs;
  tab.sw.startTs = null;
  clearInterval(tab.sw.ticker); tab.sw.ticker = null;
  if (panel) {
    panel.querySelector('.sw-toggle').textContent = '▶ 시작';
    panel.querySelector('.sw-toggle').className = 'sw-btn sw-start sw-toggle';
  }
  saveSwState(tab);
}

function _swResetOne(tab, panel) {
  clearInterval(tab.sw.ticker); tab.sw.ticker = null;
  tab.sw.base = 0; tab.sw.startTs = null;
  if (panel) {
    panel.querySelector('.sw-toggle').textContent = '▶ 시작';
    panel.querySelector('.sw-toggle').className = 'sw-btn sw-start sw-toggle';
    panel.querySelector('.sw-log-list').innerHTML = '';
    const tl = panel.querySelector('.tl-section'); if (tl) tl.style.display='none';
    swTickPanel(panel, tab);
  }
  if (tab.mob) { const s = loadS(); delete s[`sw_mob_${tab.mob.id}`]; delete s[`sw_ch_${tab.mob.id}`]; saveS(s); }
}

function swToggle() {
  const tab = activeTab();
  const panel = getActivePanel();
  const isRunning = tab.sw.startTs !== null;
  if (isRunning) _swPauseOne(tab, panel);
  else _swStartOne(tab, panel);
  if (tab.synced) {
    tabs.forEach(t => {
      if (t !== tab && t.synced) {
        const p = getPanelOf(t.idx);
        if (isRunning) _swPauseOne(t, p);
        else _swStartOne(t, p);
      }
    });
  }
}

function swReset() {
  if (!confirm('스톱워치와 획득 기록을 리셋할까요?')) return;
  const tab = activeTab();
  _swResetOne(tab, getActivePanel());
  if (tab.synced) {
    tabs.forEach(t => { if (t !== tab && t.synced) _swResetOne(t, getPanelOf(t.idx)); });
  }
}

function swSyncToggle() {
  const tab = activeTab();
  tab.synced = !tab.synced;
  updateSyncBtn(getActivePanel(), tab);
  renderTabBar();
}

function updateSyncBtn(panel, tab) {
  if (!panel) return;
  const btn = panel.querySelector('.sw-sync');
  if (!btn) return;
  btn.style.display = tabs.length >= 2 ? 'block' : 'none';
  btn.textContent = tab.synced ? '🔗 동기화 중' : '🔗 동기화';
  btn.className = 'sw-sync' + (tab.synced ? ' sw-sync-on' : '');
}

function updateAllSyncBtns() {
  tabs.forEach(t => updateSyncBtn(getPanelOf(t.idx), t));
}

// sw 상태를 localStorage에 저장 (몹별)
function saveSwState(tab) {
  const mob = tab.mob;
  if (!mob) return;
  const s = loadS();
  s[`sw_mob_${mob.id}`] = { base: swElapsed(tab) };
  saveS(s);
}

// 몹에 저장된 sw 상태를 탭에 복원 (항상 정지 상태로)
function restoreSwState(tab, mob) {
  const s = loadS();
  const saved = s[`sw_mob_${mob.id}`];
  // 현재 돌던 ticker 정지
  clearInterval(tab.sw.ticker);
  tab.sw.ticker = null;
  tab.sw.startTs = null;
  tab.sw.base = saved ? (saved.base || 0) : 0;
}

function swTickPanel(panel, tab) {
  const el = panel?.querySelector('.sw-display');
  if (el) el.textContent = fmtTime(swElapsed(tab));
  if (!tab.mob) return;
  const totalMs = swElapsed(tab);
  if (totalMs < 1000) return;
  const sec = Math.floor(totalMs / 1000);
  const min = Math.floor(totalMs / 60000);
  // 매초: 행 수 변경 감지 (1시간 지나면 새 줄 추가)
  if (tab._tlLastSec !== sec) {
    tab._tlLastSec = sec;
    const totalRows = Math.max(1, Math.ceil(totalMs / TL_ROW_MS));
    const section = panel?.querySelector('.tl-section');
    const currentRows = section ? section.querySelectorAll('.tl-row').length : 0;
    if (currentRows !== totalRows) {
      renderTimeline(panel, tab.mob, tab);
      tab._tlLastMin = min;
      return;
    }
  }
  // 매분: 마지막 행 게이지 fill 업데이트
  if (tab._tlLastMin !== min) {
    tab._tlLastMin = min;
    tlUpdateFill(panel, totalMs);
  }
}

// ══════════════════════════════════════════
// 5. 타임라인
// ══════════════════════════════════════════
const TL_ROW_MS = 1 * 3600 * 1000;   // 1시간 = 한 줄
const TL_MAX_MS = 100 * 3600 * 1000; // 100시간 = 빨강 기준

const TL_RARITY = [
  { min:1,     cls:'tl-r0', color:'#3498db'  }, // 파랑  (1%~100%)
  { min:0.1,   cls:'tl-r1', color:'#2ecc71'  }, // 초록  (0.1%~1%)
  { min:0.01,  cls:'tl-r2', color:'#f1c40f'  }, // 노랑  (0.01%~0.1%)
  { min:0.007, cls:'tl-r3', color:'#e67e22'  }, // 주황  (0.007%~0.01%)
  { min:0.005, cls:'tl-r4', color:'#e74c3c'  }, // 빨강  (0.005%~0.007%)
  { min:0,     cls:'tl-r5', color:'#9b59b6'  }, // 보라  (0.005% 이하)
];
function tlRarity(rateStr) {
  const r = parseFloat(rateStr);
  if (isNaN(r)) return TL_RARITY[4];
  for (const t of TL_RARITY) if (r >= t.min) return t;
  return TL_RARITY[4];
}
function tlColor(ms) {
  // sqrt 커브: 파랑(240)→빨강(0), 6시간에서도 시안으로 눈에 띄게 변화
  const p = Math.sqrt(Math.min(ms / TL_MAX_MS, 1));
  const h = Math.round(240 - p * 240); // 파랑(240) → 빨강(0)
  const s = Math.round(70 + p * 20);
  const l = Math.round(50 - p * 10);
  return `hsl(${h},${s}%,${l}%)`;
}
function tlRowGrad(row) {
  return `linear-gradient(90deg,${tlColor(row*TL_ROW_MS)},${tlColor((row+1)*TL_ROW_MS)})`;
}
const tlShowAllByTab = {};
function tlShowAll() { return tlShowAllByTab[activeTabIdx] || false; }
function tlToggleShowAll() {
  tlShowAllByTab[activeTabIdx] = !tlShowAll();
  const panel = getActivePanel();
  const tab = activeTab();
  if (panel && tab?.mob) renderTimeline(panel, tab.mob, tab);
}

function renderTimeline(panel, mob, tab) {
  const section = panel?.querySelector('.tl-section');
  if (!section) return;
  const totalMs = swElapsed(tab);
  if (totalMs < 1000) { section.style.display='none'; return; }
  section.style.display = '';

  const s = loadS();
  const store  = s[`mob_${mob.id}`] || {};
  const excl   = new Set(s[`excl_${mob.id}`] || []);
  const chMarks = s[`sw_ch_${mob.id}`] || [];

  // 아이템 목록: 전체 모드면 times[] 각각, 최초 모드면 firstTime만
  const items = [];
  mob.drops.filter(d => !excl.has(d.id)).forEach(d => {
    const st = store[d.id];
    if (!st || st.firstTime == null) return;
    if (tlShowAll()) {
      const allTimes = st.times?.length ? st.times : [st.firstTime];
      allTimes.forEach(t => items.push({ ...d, firstTime: t }));
    } else {
      items.push({ ...d, firstTime: st.firstTime });
    }
  });
  items.sort((a,b) => a.firstTime - b.firstTime);

  const totalRows = Math.max(1, Math.ceil(totalMs / TL_ROW_MS));
  let rowsHtml = '';
  for (let row = 0; row < totalRows; row++) {
    const rStart = row * TL_ROW_MS, rEnd = rStart + TL_ROW_MS;
    const fillPct = totalMs >= rEnd ? 100 : ((totalMs - rStart) / TL_ROW_MS * 100).toFixed(1);
    const rowItems = items.filter(d => d.firstTime >= rStart && d.firstTime < rEnd);

    // 클러스터 그룹핑 (10% 이내 = 같은 클러스터, 1h 기준 ~6분)
    const OVERLAP = 10;
    const clusters = [];
    rowItems.forEach(d => {
      const xPct = (d.firstTime - rStart) / TL_ROW_MS * 100;
      const hit = clusters.find(c => Math.abs(c.xPct - xPct) < OVERLAP);
      if (hit) hit.items.push(d);
      else clusters.push({ xPct, items:[d] });
    });
    const calloutsH = rowItems.length > 0 ? 34 : 0;

    let callHtml = '';
    clusters.forEach(({ xPct, items }) => {
      const cx = Math.min(Math.max(xPct, 2), 98).toFixed(1);
      if (items.length === 1) {
        const d = items[0]; const rar = tlRarity(d.rate);
        callHtml += `<div class="tl-callout" style="left:${cx}%;bottom:0">
          <div class="tl-callout-box ${rar.cls}" title="${escHtml(d.name)}">
            <img src="${itemImg(d.id)}" alt="${escHtml(d.name)}" onerror="this.src='${BLANK}'">
          </div>
          <div class="tl-arrow" style="border-top-color:${rar.color}"></div>
        </div>`;
      } else {
        // 덱으로 쌓기 — 클릭하면 펼쳐짐
        // 유니크 아이템 먼저, 중복은 뒤로 (접힌 상태에서 종류별 대표 아이콘 표시)
        const seenIds = new Set();
        const uniqueItems = [], dupItems = [];
        items.forEach(d => { if (!seenIds.has(d.id)) { seenIds.add(d.id); uniqueItems.push(d); } else dupItems.push(d); });
        const orderedItems = [...uniqueItems, ...dupItems];
        const MAX_VIS = 3; // 접힌 상태 최대 표시 종류 수
        const visCount = Math.min(uniqueItems.length, MAX_VIS);
        const arrowIdx = visCount > 1 ? 1 : 0;
        let wrapsHtml = '';
        orderedItems.forEach((d, i) => {
          const rar = tlRarity(d.rate);
          const rot = i < visCount ? (i - (visCount-1)/2) * 6 : 0; // visible 개수 기준 팬 효과
          const isExtra = i >= MAX_VIS;
          const showArrow = i === arrowIdx;
          wrapsHtml += `<div class="tl-callout-wrap${isExtra?' tl-extra':''}" data-item-id="${d.id}" style="transform:rotate(${rot}deg)">
            <div class="tl-callout-box ${rar.cls}" title="${escHtml(d.name)}">
              <img src="${itemImg(d.id)}" alt="${escHtml(d.name)}" onerror="this.src='${BLANK}'">
            </div>
            ${showArrow ? `<div class="tl-arrow" style="border-top-color:${rar.color}"></div>` : `<div class="tl-arrow-spacer"></div>`}
          </div>`;
        });
        callHtml += `<div class="tl-cluster" style="left:${cx}%" onclick="tlToggleCluster(event,this)">
          ${wrapsHtml}
          <div class="tl-cluster-badge">+${items.length}</div>
        </div>`;
      }
    });

    // 채널변경 마커 (bar-wrap 안에 배치)
    let chHtml = '';
    chMarks.filter(ms => ms >= rStart && ms < rEnd).forEach(ms => {
      const xPct = ((ms - rStart) / TL_ROW_MS * 100).toFixed(1);
      chHtml += `<div class="tl-ch-mark" style="left:${xPct}%"></div>`;
    });

    rowsHtml += `<div class="tl-row" data-row="${row}">
      ${calloutsH > 0 ? `<div class="tl-callouts" style="height:${calloutsH}px">${callHtml}</div>` : ''}
      <div class="tl-bar-zone">
        <div class="tl-bar-wrap">
          <div class="tl-bar-fill" style="width:${fillPct}%;background:${tlRowGrad(row)}"></div>
          <div class="tl-bar-label"><span>${row}h</span><span>${row+1}h</span></div>
        </div>
        ${chHtml}
      </div>
    </div>`;
  }
  section.querySelector('.tl-rows').innerHTML = rowsHtml;
  // 토글 버튼 업데이트
  const ptitleEl = section.querySelector('.ptitle');
  if (ptitleEl) {
    ptitleEl.innerHTML = `📊 타임라인<button class="tl-toggle-btn${tlShowAll()?' on':''}" onclick="tlToggleShowAll()">${tlShowAll() ? '최초만' : '전체'}</button>`;
  }
}
function deleteChannelEntry(btn) {
  const entry = btn.closest('.sw-log-entry');
  const ms = Number(entry.dataset.chMs);
  if (activeMob) {
    const s = loadS();
    const key = `sw_ch_${activeMob.id}`;
    s[key] = (s[key] || []).filter(t => t !== ms);
    saveS(s);
    renderTimeline(getActivePanel(), activeMob, activeTab());
  }
  entry.remove();
}

function tlToggleCluster(e, el) {
  e.stopPropagation();
  const allWraps = [...el.querySelectorAll('.tl-callout-wrap')];
  const isOpen = el.classList.toggle('open');

  allWraps.forEach(w => { w.querySelector('.tl-dup-badge')?.remove(); w.style.display = ''; });

  if (isOpen) {
    // 같은 아이템 ID는 첫 번째만 표시, 나머지 숨김
    const seen = {};
    const visibleWraps = [];
    allWraps.forEach(w => {
      const id = w.dataset.itemId;
      if (!seen[id]) { seen[id] = { wrap: w, count: 0 }; visibleWraps.push(w); }
      seen[id].count++;
    });
    const visibleSet = new Set(visibleWraps);
    allWraps.forEach(w => { if (!visibleSet.has(w)) w.style.display = 'none'; });

    // ×n 뱃지 (중복 있는 것만)
    Object.values(seen).forEach(({ wrap, count }) => {
      if (count > 1) {
        const b = document.createElement('div');
        b.className = 'tl-dup-badge';
        b.textContent = `×${count}`;
        wrap.appendChild(b);
      }
    });

    // 유니크 아이템들만 펼치기 (37px = 34px 아이콘 + 3px 여백)
    const spread = 37;
    const offset = -(visibleWraps.length - 1) * spread / 2;
    visibleWraps.forEach((w, i) => {
      w.style.transform = `translateX(${offset + i * spread}px) rotate(0deg)`;
      w.style.zIndex = visibleWraps.length - i; // 왼쪽이 위로
    });
    allWraps.forEach(w => { if (!visibleSet.has(w)) { w.style.transform = 'rotate(0deg)'; w.style.zIndex = ''; } });
  } else {
    const visibles = allWraps.filter(w => !w.classList.contains('tl-extra'));
    const vc = visibles.length;
    allWraps.forEach((w, i) => {
      w.style.transform = i < vc ? `rotate(${(i - (vc-1)/2) * 6}deg)` : 'rotate(0deg)';
      w.style.zIndex = '';
    });
  }
}

function restoreLogEntries(panel, mob) {
  const s = loadS();
  const mobStore = s[`mob_${mob.id}`] || {};
  const itemEntries = mob.drops
    .filter(d => mobStore[d.id]?.firstTime != null)
    .map(d => ({ ms: mobStore[d.id].firstTime, isCh: false, id: d.id, name: d.name }));
  const chEntries = (s[`sw_ch_${mob.id}`] || []).map(ms => ({ ms, isCh: true }));
  const all = [...itemEntries, ...chEntries].sort((a,b) => b.ms - a.ms);
  const list = panel.querySelector('.sw-log-list');
  all.forEach(e => {
    const el = document.createElement('div');
    if (e.isCh) {
      el.className = 'sw-log-entry sw-log-channel';
      el.dataset.chMs = e.ms;
      el.innerHTML = `<span class="lt">${fmtTimeLog(e.ms)}</span><span class="ln">📡 채널변경</span><button class="ldel" title="삭제" onclick="deleteChannelEntry(this)">✕</button>`;
    } else {
      el.className = 'sw-log-entry';
      el.dataset.dropId = e.id;
      el.innerHTML = `<span class="lt">${fmtTimeLog(e.ms)}</span><span class="ln">${escHtml(e.name)}</span><button class="ldel" title="삭제" onclick="deleteLogEntry(this)">✕</button>`;
    }
    list.appendChild(el);
  });
}

function _swChannelMarkOne(tab, panel) {
  const ms = swElapsed(tab);
  if (ms < 100) return;
  if (tab.mob) {
    const s = loadS();
    const key = `sw_ch_${tab.mob.id}`;
    const chs = s[key] || []; chs.push(ms); s[key] = chs; saveS(s);
  }
  const list = panel?.querySelector('.sw-log-list');
  if (!list) return;
  const entry = document.createElement('div');
  entry.className = 'sw-log-entry sw-log-channel fade-in';
  entry.dataset.chMs = ms;
  entry.innerHTML = `<span class="lt">${fmtTimeLog(ms)}</span><span class="ln">📡 채널변경</span><button class="ldel" title="삭제" onclick="deleteChannelEntry(this)">✕</button>`;
  list.insertBefore(entry, list.firstChild);
  if (tab.mob) renderTimeline(panel, tab.mob, tab);
}

function swChannelMark() {
  const tab = activeTab();
  const panel = getActivePanel();
  _swChannelMarkOne(tab, panel);
  if (tab.synced) {
    tabs.forEach(t => {
      if (t !== tab && t.synced) _swChannelMarkOne(t, getPanelOf(t.idx));
    });
  }
}

function tlUpdateFill(panel, totalMs) {
  const section = panel?.querySelector('.tl-section');
  if (!section) return;
  const totalRows = Math.max(1, Math.ceil(totalMs / TL_ROW_MS));
  const rows = section.querySelectorAll('.tl-row');
  const last = rows[rows.length-1];
  if (!last) return;
  const lastStart = (totalRows-1) * TL_ROW_MS;
  const fill = last.querySelector('.tl-bar-fill');
  if (fill) fill.style.width = Math.min(100, (totalMs-lastStart)/TL_ROW_MS*100).toFixed(1)+'%';
}

function fmtTime(ms) {
  if (ms < 0) ms = 0;
  const h  = Math.floor(ms / 3600000);
  const m  = Math.floor((ms % 3600000) / 60000);
  const s  = Math.floor((ms % 60000) / 1000);
  const cs = Math.floor((ms % 1000) / 10);
  return `${pad(h)}:${pad(m)}:${pad(s)}.${pad(cs)}`;
}
function fmtTimeLog(ms) {
  if (ms < 0) ms = 0;
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  return `${pad(h)}:${pad(m)}:${pad(s)}`;
}
function pad(n) { return String(n).padStart(2,'0'); }

function initSw() { /* 탭 생성 시 각 탭에서 초기화 */ }

const BLANK = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
function mobImg(id)  { return `https://maplestory.io/api/kms/284/mob/${id}/icon`; }
function itemImg(id) { return `https://maplestory.io/api/kms/284/item/${id}/icon`; }

function rateBadge(r) {
  const n = parseFloat(r);
  if (n >= 1)     return `<span class="rb rb-blue">${r}</span>`;
  if (n >= 0.1)   return `<span class="rb rb-green">${r}</span>`;
  if (n >= 0.01)  return `<span class="rb rb-yellow">${r}</span>`;
  if (n >= 0.007) return `<span class="rb rb-orange">${r}</span>`;
  if (n >= 0.005) return `<span class="rb rb-red">${r}</span>`;
  return                 `<span class="rb rb-purple">${r}</span>`;
}

function renderMobGrid(container, monsters) {
  container.innerHTML = '';
  monsters.forEach(m => {
    const c = document.createElement('div');
    c.className = 'mob-card fade-in';
    c.dataset.mobId = m.id;
    c.innerHTML = `
      <img src="${mobImg(m.id)}" alt="${escHtml(m.name)}" onerror="this.src='${BLANK}'">
      <div class="mn">${escHtml(m.name)}</div>
    `;
    c.addEventListener('click', () => {
      if (m.drops && m.drops.length) activateMob(m);        // 프리셋: 드롭 데이터 있음
      else fetchMobDrops(m.id, m.name, m.level);            // 검색결과: mapledb에서 드롭 로드
    });
    container.appendChild(c);
  });
}

// 8. 이름 검색 (프리셋 즉시 필터 + 자동 mapledb 검색)

let searchDebounce = null;

function onNameInput(v) {
  const q = v.trim().toLowerCase();
  const res = document.getElementById('search-results');
  const status = document.getElementById('search-status');

  clearTimeout(searchDebounce);

  if (!q) { res.innerHTML = ''; status.textContent = ''; return; }

  // 프리셋 즉시 표시 (빠른 응답)
  const hits = PRESET.filter(m => m.name.toLowerCase().includes(q));
  if (hits.length) renderMobGrid(res, hits);
  else res.innerHTML = '';

  // 항상 mapledb 전체 검색 (600ms debounce)
  status.textContent = '⏳ 전체 DB 검색 중...'; status.className = 'msg';
  searchDebounce = setTimeout(() => searchByName(), 600);
}

// ══════════════════════════════════════════
// 9. CORS 프록시 (여러 개 순차 시도)
// ══════════════════════════════════════════
async function proxyFetch(url) {
  const proxies = [
    async u => {
      const r = await fetch(`https://corsproxy.io/?${encodeURIComponent(u)}`, {signal: AbortSignal.timeout(8000)});
      if (!r.ok) throw new Error(r.status);
      return r.text();
    },
    async u => {
      const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(u)}`, {signal: AbortSignal.timeout(8000)});
      if (!r.ok) throw new Error(r.status);
      const j = await r.json();
      return j.contents;
    },
    async u => {
      const r = await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`, {signal: AbortSignal.timeout(8000)});
      if (!r.ok) throw new Error(r.status);
      return r.text();
    },
  ];

  for (const tryProxy of proxies) {
    try {
      const html = await tryProxy(url);
      if (html && html.length > 200) return html;
    } catch {}
  }
  throw new Error('모든 프록시 연결 실패. 잠시 후 다시 시도해주세요.');
}

// ══════════════════════════════════════════
// 10. maplestory.io API로 몬스터 이름 검색
//     (CORS 프록시 불필요, 직접 호출)
// ══════════════════════════════════════════
async function searchByName() {
  const q = document.getElementById('name-input').value.trim();
  if (!q) return;

  const status = document.getElementById('search-status');
  status.textContent = `⏳ "${q}" 검색 중...`; status.className = 'msg';

  try {
    // 1단계: kms/284로 한국어 이름 검색
    const res = await fetch(
      `https://maplestory.io/api/kms/284/mob?name=${encodeURIComponent(q)}`,
      { signal: AbortSignal.timeout(8000) }
    );
    if (!res.ok) throw new Error(`API 오류 (${res.status})`);
    const data = await res.json();

    const raw = (Array.isArray(data) ? data : [])
      .filter(m => m.name && m.name.includes(q) && m.id < 9000000);

    // 이름 중복 제거 (같은 이름이면 ID 낮은 것만)
    const seen = new Map();
    for (const m of raw) {
      if (!seen.has(m.name) || m.id < seen.get(m.name).id) seen.set(m.name, m);
    }

    let mobs = [...seen.values()]
      .map(m => ({ id: m.id, name: m.name, level: m.level || 0 }))
      .sort((a, b) => {
        const aExact = a.name === q, bExact = b.name === q;
        if (aExact !== bExact) return aExact ? -1 : 1;
        return a.level - b.level;
      });

    if (!mobs.length) {
      status.textContent = '검색 결과가 없습니다.'; status.className = 'msg err'; return;
    }

    // 2단계: 각 결과의 linksTo(클래식 ID) 병렬 조회
    // → 현대 KMS ID → 클래식 ID 변환 (메이플노트와 ID 일치)
    status.textContent = `⏳ 클래식 ID 확인 중...`; status.className = 'msg';
    const resolved = await Promise.all(mobs.map(async m => {
      try {
        const r = await fetch(
          `https://maplestory.io/api/kms/284/mob/${m.id}`,
          { signal: AbortSignal.timeout(5000) }
        );
        if (!r.ok) return m;
        const detail = await r.json();
        // linksTo가 있으면 그게 클래식 ID
        if (detail.linksTo && detail.linksTo !== m.id) {
          return { ...m, id: detail.linksTo };
        }
      } catch {}
      return m;
    }));

    // 클래식 ID 중복 제거
    const finalSeen = new Map();
    for (const m of resolved) {
      if (!finalSeen.has(m.id)) finalSeen.set(m.id, m);
    }
    mobs = [...finalSeen.values()];

    status.textContent = `${mobs.length}개 결과`; status.className = 'msg';
    renderMobGrid(document.getElementById('search-results'), mobs);
  } catch(e) {
    status.textContent = `❌ ${e.message}`; status.className = 'msg err';
  }
}

function parseSearchHTML(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const seen = new Set(); const results = [];
  doc.querySelectorAll('a[href*="t=mob"]').forEach(a => {
    const m = a.href.match(/q=(\d+)&t=mob/);
    if (!m) return;
    const id = parseInt(m[1]);
    if (seen.has(id)) return; seen.add(id);
    const h = a.querySelector('h3,h4,h2,.name');
    let name = h ? h.textContent.trim() : a.textContent.trim().split('\n')[0].trim();
    if (!name) return;
    const lv = a.textContent.match(/Lv\.?\s*(\d+)|레벨\s*(\d+)/);
    results.push({ id, name, level: lv ? parseInt(lv[1]||lv[2]) : 0 });
  });
  return results;
}

async function fetchMobDrops(mobId, knownName, knownLevel) {
  // 1차: 메이플노트 클래식 (드롭 데이터 정확)
  setLoadMsg('⏳ 메이플노트에서 드롭 데이터 로드 중...');
  try {
    const html = await proxyFetch(`https://xn--o80b01o9mlw3kdzc.com/monster_detail/${mobId}`);
    const mob  = parseMapleNote(html, mobId, knownName, knownLevel);
    if (mob) {
      setLoadMsg(`✅ "${mob.name}" 로드 완료!`);
      activateMob(mob);
      return;
    }
  } catch(e) {}

  // 2차: mapledb.kr 폴백 (메이플노트에 없는 몬스터)
  setLoadMsg('⏳ mapledb.kr에서 드롭 데이터 로드 중...');
  try {
    const html = await proxyFetch(`https://mapledb.kr/search.php?q=${mobId}&t=mob`);
    const mob  = parseMonsterPage(html, mobId, knownName, knownLevel);
    if (!mob) throw new Error('파싱 실패. 올바른 몬스터 ID인지 확인해주세요.');
    setLoadMsg(`✅ "${mob.name}" 로드 완료! (mapledb.kr)`);
    activateMob(mob);
  } catch(e) {
    setLoadMsg(`❌ ${e.message}`, true);
  }
}

function parseMapleNote(html, mobId, fallbackName, fallbackLevel) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const h2   = doc.querySelector('h2');
  const name = (h2 ? h2.textContent.trim() : '') || fallbackName || `몬스터 #${mobId}`;
  let level = 0;
  doc.querySelectorAll('h3').forEach(h => {
    const m = h.textContent.match(/Lv\s*:?\s*(\d+)/);
    if (m && !level) level = parseInt(m[1]);
  });
  if (!level) level = fallbackLevel || 0;
  let hp = 0;
  const hpEl = doc.querySelector('.hp-box');
  if (hpEl) hp = parseInt(hpEl.textContent.replace(/[^0-9]/g, '')) || 0;
  const drops = [];
  const seen  = new Set();
  doc.querySelectorAll('a[href*="item_detail"]').forEach(a => {
    const href = a.getAttribute('href') || '';
    const m    = href.match(/item_detail\/(\d+)/);
    if (!m) return;
    const itemId = parseInt(m[1]);
    if (seen.has(itemId)) return; seen.add(itemId);
    const nameEl   = a.querySelector('h3');
    const itemName = nameEl ? nameEl.textContent.trim() : '';
    if (!itemName) return;
    const txt   = a.textContent.replace(itemName, '');
    const nums  = txt.match(/[\d.]+/g);
    const rate  = nums && nums.length ? `${nums[nums.length - 1]}%` : '?';
    drops.push({ name: itemName, id: itemId, rate });
  });
  if (!drops.length && !h2) return null;
  return { id: mobId, name, level, hp, drops };
}

function parseMonsterPage(html, mobId, fallbackName, fallbackLevel) {
  const doc = new DOMParser().parseFromString(html, 'text/html');

  // 이름
  let name = fallbackName || '';
  if (!name) {
    const h1 = doc.querySelector('h1');
    if (h1) name = h1.textContent.trim();
  }
  if (!name) {
    const t = doc.title.match(/^(.+?)[\s\-|]/);
    if (t) name = t[1].trim();
  }
  if (!name) name = `몬스터 #${mobId}`;

  // 레벨/HP
  const body = doc.body?.innerText || '';
  const lvM = body.match(/(?:레벨|LEVEL)\s*:?\s*(\d+)/i);
  const hpM = body.match(/HP[^\d]*([0-9,]+)/);
  const level = (lvM ? parseInt(lvM[1]) : 0) || fallbackLevel || 0; // mapledb 우선, 없으면 fallback
  const hp    = hpM ? parseInt(hpM[1].replace(/,/g,'')) : 0;

  // 드롭 아이템 (t=item 링크)
  const drops = [];
  const seen = new Set();
  doc.querySelectorAll('a[href*="t=item"]').forEach(a => {
    const m = a.href.match(/q=(\d+)&t=item/);
    if (!m) return;
    const itemId = parseInt(m[1]);
    if (seen.has(itemId)) return; seen.add(itemId);

    const h = a.querySelector('h4,h3,h2,.name,strong');
    let itemName = h ? h.textContent.trim()
      : a.textContent.replace(/드랍율[\s\S]*|[0-9.]+%/g,'').trim();
    if (!itemName) return;

    const rm = a.textContent.match(/([0-9.]+)%/);
    drops.push({ name: itemName, id: itemId, rate: rm ? rm[0] : '?' });
  });

  if (!drops.length && !name) return null;
  return { id: mobId, name, level, hp, drops, fromDB: true };
}

function setLoadMsg(t, err=false) {
  const el = document.getElementById('load-msg');

function getActivePanel() {
  return document.querySelector(`.tab-panel[data-tab-idx="${activeTabIdx}"]`);
}

function getPanelOf(tabIdx) {
  return document.querySelector(`.tab-panel[data-tab-idx="${tabIdx}"]`);
}

function renderTabBar() {
  const bar = document.getElementById('tab-bar');
  bar.innerHTML = '';
  tabs.forEach(tab => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (tab.idx === activeTabIdx ? ' active' : '');
    const name = tab.mob ? tab.mob.name : `탭 ${tab.idx + 1}`;
    const imgSrc = tab.mob ? mobImg(tab.mob.id) : '';
    btn.innerHTML = `
      ${tab.mob ? `<img src="${imgSrc}" onerror="this.style.display='none'">` : ''}
      <span>${name}</span>
      ${tab.synced ? `<span class="tab-sync-dot" title="동기화 중"></span>` : ''}
      ${tabs.length > 1 ? `<span class="tab-close" data-tidx="${tab.idx}" onclick="closeTab(event,${tab.idx})">✕</span>` : ''}
    `;
    btn.addEventListener('click', e => {
      if (e.target.classList.contains('tab-close')) return;
      switchTab(tab.idx);
    });
    bar.appendChild(btn);
  });
  if (tabs.length < MAX_TABS) {
    const add = document.createElement('button');
    add.className = 'tab-add';
    add.textContent = '+';
    add.title = '탭 추가 (최대 3개)';
    add.onclick = addTab;
    bar.appendChild(add);
  }
}

function switchTab(idx) {
  activeTabIdx = idx;
  document.querySelectorAll('.tab-panel').forEach(p => {
    p.classList.toggle('active', parseInt(p.dataset.tabIdx) === idx);
  });
  renderTabBar();
  // 전환된 탭 스톱워치 tick 재시작
  const tab = tabs[idx];
  const swPanel = getPanelOf(idx);
  if (tab.sw.startTs !== null) {
    clearInterval(tab.sw.ticker);
    const tabRef = tab;
    tab.sw.ticker = setInterval(() => swTickPanel(getPanelOf(tabRef.idx), tabRef), 50);
    swPanel?.querySelector('.sw-toggle') && (swPanel.querySelector('.sw-toggle').textContent = '⏸ 일시정지');
    swPanel?.querySelector('.sw-toggle') && (swPanel.querySelector('.sw-toggle').className = 'sw-btn sw-pause sw-toggle');
  } else {
    swPanel?.querySelector('.sw-toggle') && (swPanel.querySelector('.sw-toggle').textContent = '▶ 시작');
    swPanel?.querySelector('.sw-toggle') && (swPanel.querySelector('.sw-toggle').className = 'sw-btn sw-start sw-toggle');
  }
  swTickPanel(swPanel, tab);
}

function addTab() {
  if (tabs.length >= MAX_TABS) return;
  const idx = tabs.length;
  const tab = makeTab(idx);
  tabs.push(tab);
  const panel = buildTabPanel(tab);
  document.getElementById('tab-panels').appendChild(panel);
  document.getElementById('section-checklist').style.display = 'block';
  switchTab(idx);
  updateAllSyncBtns();
}

function closeTab(e, idx) {
  e.stopPropagation();
  if (tabs.length <= 1) return;
  // 스톱워치 상태 저장 후 정지
  saveSwState(tabs[idx]);
  clearInterval(tabs[idx].sw.ticker);
  tabs.splice(idx, 1);
  // idx 재정렬
  tabs.forEach((t, i) => { t.idx = i; });
  // 패널 재정렬
  const panelsEl = document.getElementById('tab-panels');
  panelsEl.innerHTML = '';
  tabs.forEach(t => {
    const p = buildTabPanel(t);
    panelsEl.appendChild(p);
    if (t.mob) restorePanelForTab(t);
    // 돌고 있던 스톱워치 ticker 재등록
    if (t.sw.startTs !== null) {
      clearInterval(t.sw.ticker);
      const tabRef = t;
      t.sw.ticker = setInterval(() => swTickPanel(getPanelOf(tabRef.idx), tabRef), 50);
    }
  });
  activeTabIdx = Math.min(activeTabIdx, tabs.length - 1);
  switchTab(activeTabIdx);
  updateAllSyncBtns();
}

function restorePanelForTab(tab) {
  const panel = getPanelOf(tab.idx);
  if (!panel || !tab.mob) return;
  const mob = tab.mob;
  panel.querySelector('.mob-img').src = mobImg(mob.id);
  panel.querySelector('.mob-name').textContent = mob.name;
  panel.querySelector('.mob-stats').textContent = '';
  panel.querySelector('.mob-link').href = `https://mapledb.kr/search.php?q=${mob.id}&t=mob`;
  // 아이템 그리드 복원
  renderItemGridInPanel(panel, mob);
  updateProgressInPanel(panel, mob);
  updateHuntEstimateInPanel(panel, mob);
  // 획득 기록 복원
  restoreLogEntries(panel, mob);
  renderTimeline(panel, mob, tabs.find(t => t.mob?.id === mob.id) || activeTab());
  // sw 버튼 상태 반영
  const swToggleBtn = panel.querySelector('.sw-toggle');
  if (swToggleBtn) {
    if (tab.sw.startTs !== null) {
      swToggleBtn.textContent = '⏸ 일시정지'; swToggleBtn.className = 'sw-btn sw-pause sw-toggle';
    } else {
      swToggleBtn.textContent = '▶ 시작'; swToggleBtn.className = 'sw-btn sw-start sw-toggle';
    }
  }
  swTickPanel(panel, tab);
}

// ══════════════════════════════════════════
// 11. 몬스터 활성화
// ══════════════════════════════════════════
function activateMob(mob) {
  const tab = activeTab();

  // 이전 몹 sw 상태 저장 (다른 몹으로 교체 시)
  if (tab.mob && tab.mob.id !== mob.id) {
    saveSwState(tab);
  }

  // 현재 탭에 몹 할당
  tab.mob = mob;

  // 탭 패널이 없으면 첫 탭 패널 생성
  if (!document.querySelector('.tab-panel')) {
    const panel = buildTabPanel(activeTab());
    document.getElementById('tab-panels').appendChild(panel);
  }

  const panel = getActivePanel();

  // 그리드 선택 표시
  document.querySelectorAll('.mob-card').forEach(c =>
    c.classList.toggle('sel', parseInt(c.dataset.mobId) === mob.id)
  );

  // 헤더 업데이트
  panel.querySelector('.mob-img').src = mobImg(mob.id);
  panel.querySelector('.mob-name').textContent = mob.name;
  panel.querySelector('.mob-stats').textContent = '';
  panel.querySelector('.mob-link').href = `https://mapledb.kr/search.php?q=${mob.id}&t=mob`;

  // 몬스터 이름 meta 저장
  const s = loadS();
  s[`mob_${mob.id}_meta`] = { name: mob.name, total: mob.drops.length };
  saveS(s);

  // 스톱워치 상태 복원 (몹별 저장된 시간)
  restoreSwState(tab, mob);
  panel.querySelector('.sw-toggle').textContent = '▶ 시작';
  panel.querySelector('.sw-toggle').className = 'sw-btn sw-start sw-toggle';
  swTickPanel(panel, tab);

  // 스톱워치 로그 복원
  panel.querySelector('.sw-log-list').innerHTML = '';
  restoreLogEntries(panel, mob);
  renderTimeline(panel, mob, tab);

  renderItemGrid();

  const sec = document.getElementById('section-checklist');
  sec.style.display = 'block';
  renderTabBar();
  sec.scrollIntoView({ behavior:'smooth', block:'start' });
}

const showExcludedByTab = {}; // 탭별 제외 아이템 보기 상태

function renderItemGridInPanel(panel, mob) {
  const grid = panel.querySelector('.item-grid');
  grid.innerHTML = '';
  const store = loadS();
  const key = `mob_${mob.id}`;
  const mobData  = store[key] || {};
  const excluded = new Set(store[`excl_${mob.id}`] || []);

  mob.drops.forEach(drop => {
    const state = mobData[drop.id] || { count:0, firstTime:null };
    const isExcl = excluded.has(drop.id);
    const card   = buildItemCard(drop, state, isExcl);
    if (isExcl && !getShowExcluded()) card.style.display = 'none';
    grid.appendChild(card);
  });
}

function buildItemCard(drop, state, isExcl = false) {
  const found = state.count > 0 && !isExcl;
  const cls   = isExcl ? 'excl' : (found ? 'fd' : 'nf');
  const card  = document.createElement('div');
  card.className = `item-card ${cls} fade-in`;
  card.dataset.itemId = drop.id;

  card.innerHTML = `
    <div class="icon-wrap">
      <img src="${itemImg(drop.id)}" alt="${escHtml(drop.name)}" onerror="this.src='${BLANK}'">
      <span class="cn" style="${found?'':'display:none'}">${state.count}</span>
    </div>
    <div class="card-body">
      <div class="cname" title="${escHtml(drop.name)}">${escHtml(drop.name)}</div>
      <div class="crate">${isExcl ? '<span style="font-size:.6rem;color:#4a3030">제외됨</span>' : rateBadge(drop.rate)}</div>
      <div class="ccnt">${isExcl ? '' : `수집 ${state.count}회`}</div>
      <div class="ctime">${(!isExcl && state.firstTime !== null) ? '첫 출현 ' + fmtTime(state.firstTime) : ''}</div>
    </div>
    <button class="excl-btn" title="${isExcl?'제외 해제':'이 아이템 제외'}"
            onclick="toggleExclude(event,${drop.id})">${isExcl ? '↩' : '✕'}</button>
    ${!isExcl ? `<button class="decr" title="수집 1 감소" onclick="decrementItem(event,${drop.id})">−</button>` : ''}
    ${!isExcl ? `<button class="bulk-btn" title="수량 일괄 조정" onclick="bulkBtnClick(event,${drop.id})">≡</button>` : ''}
  `;

  if (!isExcl) card.addEventListener('click', () => incrementItem(drop.id));
  return card;
}

function toggleExclude(e, itemId) {
  e.stopPropagation();
  const excl = getExcluded();
  if (excl.has(itemId)) excl.delete(itemId);
  else                   excl.add(itemId);
  setExcluded(excl);
  renderItemGrid();
  renderSaves();
}

// ══════════════════════════════════════════
// 13. 아이템 카운트 조작
// ══════════════════════════════════════════

// ── Bulk popup ──
let _bpItemId = null;
let _bpPendingDelta = 0;
let _bpOrigCount = 0;

function bulkBtnClick(e, itemId) {
  e.stopPropagation();
  openBulkPopup(itemId);
}

function openBulkPopup(itemId) {
  if (!activeMob) return;
  const drop = activeMob.drops.find(d => d.id === itemId);
  if (!drop) return;
  const store = loadS();
  const state = store[`mob_${activeMob.id}`]?.[itemId] || { count:0 };
  _bpItemId = itemId;
  _bpPendingDelta = 0;
  _bpOrigCount = state.count;

  document.getElementById('bp-icon').src = itemImg(itemId);
  document.getElementById('bp-icon').onerror = function(){ this.src = BLANK; };
  document.getElementById('bp-name').textContent = drop.name;
  _bpRenderCount();
  document.getElementById('bulk-overlay').classList.add('open');
}

function _bpRenderCount() {
  const newCount = Math.max(0, _bpOrigCount + _bpPendingDelta);
  document.getElementById('bp-count').textContent = newCount;
  const hint = document.getElementById('bp-delta-hint');
  const confirm = document.getElementById('bp-confirm');
  if (_bpPendingDelta === 0) {
    hint.textContent = '';
    hint.className = 'bp-delta-hint';
    confirm.disabled = true;
  } else {
    const sign = _bpPendingDelta > 0 ? '+' : '';
    hint.textContent = `${_bpOrigCount}개 → ${newCount}개 (${sign}${_bpPendingDelta})`;
    hint.className = 'bp-delta-hint ' + (_bpPendingDelta > 0 ? 'pos' : 'neg');
    confirm.disabled = false;
  }
}

function bulkAdjust(delta) {
  const newCount = _bpOrigCount + _bpPendingDelta + delta;
  if (newCount < 0 && delta < 0) {
    // clamp: don't go below 0
    _bpPendingDelta = -_bpOrigCount;
  } else {
    _bpPendingDelta += delta;
  }
  _bpRenderCount();
}

function applyBulk() {
  if (!activeMob || _bpItemId == null || _bpPendingDelta === 0) { closeBulkPopup(); return; }
  const drop = activeMob.drops.find(d => d.id === _bpItemId);
  if (!drop) { closeBulkPopup(); return; }
  const store = loadS();
  const key = `mob_${activeMob.id}`;
  if (!store[key]) store[key] = {};
  const state = store[key][_bpItemId] || { count:0, firstTime:null, times:[] };
  if (!state.times) state.times = state.firstTime ? [state.firstTime] : [];
  const newCount = Math.max(0, state.count + _bpPendingDelta);
  const t = swElapsed(activeTab());
  if (newCount > state.count) {
    // adding items: record times for each added
    const wasZero = state.count === 0;
    if (wasZero && newCount > 0) state.firstTime = t;
    for (let i = state.count; i < newCount; i++) state.times.push(t);
    if (wasZero && newCount > 0) addSwLogToPanel(getActivePanel(), drop.name, state.firstTime, _bpItemId);
  } else if (newCount < state.count) {
    // removing items: pop from times
    for (let i = state.count; i > newCount; i--) state.times.pop();
    if (newCount === 0) { state.firstTime = null; state.times = []; removeItemLog(getActivePanel(), _bpItemId); }
  }
  state.count = newCount;
  store[key][_bpItemId] = state;
  saveS(store);
  updateCardUI(_bpItemId, state, drop);
  updateProgress();
  updateHuntEstimate();
  renderSaves();
  renderTimeline(getActivePanel(), activeMob, activeTab());
  closeBulkPopup();
}

function closeBulkPopup() {
  document.getElementById('bulk-overlay').classList.remove('open');
  _bpItemId = null;
}

function bulkOverlayClick(e) {
  if (e.target === document.getElementById('bulk-overlay')) closeBulkPopup();
}

function incrementItem(itemId) {
  if (!activeMob) return;
  const drop = activeMob.drops.find(d => d.id === itemId);
  if (!drop) return;

  const store = loadS();
  const key = `mob_${activeMob.id}`;
  if (!store[key]) store[key] = {};
  const state = store[key][itemId] || { count:0, firstTime:null, times:[] };
  if (!state.times) state.times = state.firstTime ? [state.firstTime] : [];
  const isFirst = state.count === 0;
  const t = swElapsed(activeTab());
  if (isFirst) state.firstTime = t;
  state.times.push(t);
  state.count++;
  store[key][itemId] = state;
  saveS(store);

  updateCardUI(itemId, state, drop);
  if (isFirst) addSwLogToPanel(getActivePanel(), drop.name, state.firstTime, itemId);
  updateProgress();
  updateHuntEstimate();
  renderSaves();
  renderTimeline(getActivePanel(), activeMob, activeTab());
}

function decrementItem(e, itemId) {
  e.stopPropagation();
  if (!activeMob) return;
  const drop = activeMob.drops.find(d => d.id === itemId);
  if (!drop) return;

  const store = loadS();
  const key = `mob_${activeMob.id}`;
  const state = store[key]?.[itemId];
  if (!state || state.count <= 0) return;
  state.count--;
  if (state.times) state.times.pop();
  if (state.count === 0) { state.firstTime = null; state.times = []; removeItemLog(getActivePanel(), itemId); }
  store[key][itemId] = state;
  saveS(store);

  updateCardUI(itemId, state, drop);
  updateProgress();
  updateHuntEstimate();
  renderSaves();
  renderTimeline(getActivePanel(), activeMob, activeTab());
}

function updateCardUI(itemId, state, drop) {
  const panel = getActivePanel();
  const card = panel ? panel.querySelector(`[data-item-id="${itemId}"]`) : document.querySelector(`[data-item-id="${itemId}"]`);
  if (!card) return;

  const found = state.count > 0;
  card.className = `item-card ${found ? 'fd' : 'nf'}`;

  if (found) card.classList.add('found-flash');
  setTimeout(() => card.classList.remove('found-flash'), 500);

  const badge = card.querySelector('.cn');
  badge.textContent = state.count;
  badge.style.display = found ? '' : 'none';

  card.querySelector('.ccnt').textContent  = `수집 ${state.count}회`;
  card.querySelector('.ctime').textContent =
    state.firstTime !== null ? `첫 출현 ${fmtTime(state.firstTime)}` : '';
}

// ══════════════════════════════════════════
// 14. 스톱워치 로그
// ══════════════════════════════════════════
function removeItemLog(panel, itemId) {
  if (!panel) return;
  panel.querySelectorAll(`.sw-log-entry[data-drop-id="${itemId}"]`).forEach(el => el.remove());
}

function addSwLogToPanel(panel, name, ms, dropId) {
  if (!panel) return;
  const list = panel.querySelector('.sw-log-list');
  const entry = document.createElement('div');
  entry.className = 'sw-log-entry fade-in';
  if (dropId != null) entry.dataset.dropId = dropId;
  entry.innerHTML = `<span class="lt">${fmtTimeLog(ms)}</span><span class="ln">${escHtml(name)}</span><button class="ldel" title="삭제" onclick="deleteLogEntry(this)">✕</button>`;
  list.insertBefore(entry, list.firstChild);
}
function deleteLogEntry(btn) {
  const entry = btn.closest('.sw-log-entry');
  const dropId = entry.dataset.dropId ? Number(entry.dataset.dropId) : null;
  if (dropId != null && activeMob) {
    const s = loadS();
    const key = `mob_${activeMob.id}`;
    if (s[key]?.[dropId]) {
      s[key][dropId].firstTime = null;
      saveS(s);
      const card = getActivePanel()?.querySelector(`.item-card[data-item-id="${dropId}"]`);
      if (card) card.querySelector('.ctime').textContent = '';
      renderTimeline(getActivePanel(), activeMob, activeTab());
    }
  }
  entry.remove();
}

// ══════════════════════════════════════════
// 15. 진행도
// ══════════════════════════════════════════
function updateProgress() {
  const panel = getActivePanel();
  if (!panel || !activeMob) return;
  updateProgressInPanel(panel, activeMob);
}

function updateProgressInPanel(panel, mob) {
  const store   = loadS();
  const mobData = store[`mob_${mob.id}`] || {};
  const excl    = new Set(store[`excl_${mob.id}`] || []);

  const active  = mob.drops.filter(d => !excl.has(d.id));
  const total   = active.length;
  const done    = active.filter(d => (mobData[d.id]?.count||0) > 0).length;
  const pct     = total ? Math.round(done/total*100) : 0;
  const exclCnt = excl.size;

  panel.querySelector('.prog-cnt').textContent  = `${done} / ${total} 완료${exclCnt ? `  (제외 ${exclCnt}개)` : ''}`;
  panel.querySelector('.prog-pct').textContent  = `${pct}%`;
  panel.querySelector('.prog-fill').style.width = `${pct}%`;

  const justCompleted = done === total && total > 0;
  const badge = panel.querySelector('.complete-badge');
  const wasComplete = badge.style.display === 'block';
  badge.style.display = justCompleted ? 'block' : 'none';

  // 방금 완료된 경우 (이전에 안 완료 상태였을 때만)
  if (justCompleted && !wasComplete) {
    onDogamComplete(panel, mob);
  }

  updateHuntEstimateInPanel(panel, mob);
}

function updateHuntEstimate() {
  const panel = getActivePanel();
  if (!panel || !activeMob) return;
  updateHuntEstimateInPanel(panel, activeMob);
}

function updateHuntEstimateInPanel(panel, mob) {
  const store   = loadS();
  const mobData = store[`mob_${mob.id}`] || {};
  const excl    = new Set(store[`excl_${mob.id}`] || []);

  let bestRate = 0, bestDrop = null, bestCount = 0;

  mob.drops.forEach(drop => {
    if (excl.has(drop.id)) return;
    const count = mobData[drop.id]?.count || 0;
    if (count <= 0) return;
    const rate = parseFloat(drop.rate) / 100;
    if (!rate || rate <= 0) return;
    if (rate > bestRate) { bestRate = rate; bestDrop = drop; bestCount = count; }
  });

  const wrap = panel.querySelector('.hunt-estimate');
  if (!bestDrop) { wrap.style.display = 'none'; return; }

  const estimated = Math.round(bestCount / bestRate);
  wrap.style.display = '';
  panel.querySelector('.hunt-count').textContent = `~${estimated.toLocaleString()}마리`;
  panel.querySelector('.hunt-reason').textContent = `${bestDrop.name} ${bestCount}개 ÷ ${bestDrop.rate}`;
}

// ══════════════════════════════════════════
// 15-B. 도감작 완료 이벤트
// ══════════════════════════════════════════
function onDogamComplete(panel, mob) {
  const tab = tabs.find(t => t.mob && t.mob.id === mob.id);

  // 1. 스톱워치 멈추기
  if (tab) {
    const sw = tab.sw;
    if (sw.startTs !== null) {
      sw.base += Date.now() - sw.startTs;
      sw.startTs = null;
      clearInterval(sw.ticker); sw.ticker = null;
      saveSwState(tab);
      panel.querySelector('.sw-toggle').textContent = '▶ 시작';
      panel.querySelector('.sw-toggle').className = 'sw-btn sw-start sw-toggle';
    }
    const elapsed = swElapsed(tab);

    // 2. 획득 기록에 완료 항목 추가
    const list = panel.querySelector('.sw-log-list');
    const entry = document.createElement('div');
    entry.className = 'sw-log-entry complete fade-in';
    entry.innerHTML = `<span class="lt">${fmtTimeLog(elapsed)}</span><span class="ln">★ 도감작 완료!</span>`;
    list.insertBefore(entry, list.firstChild);
  }

  // 3. 메소 비
  mesoRain();
}

function mesoRain() {
  const container = document.getElementById('meso-rain');
  const count = 60;
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const coin = document.createElement('div');
      coin.className = 'meso-coin';
      coin.style.left = `${Math.random() * 100}%`;
      const size = 16 + Math.random() * 14;
      coin.style.width = coin.style.height = `${size}px`;
      coin.style.lineHeight = `${size - 4}px`;
      const duration = 1.5 + Math.random() * 2;
      const delay = Math.random() * 1.5;
      coin.style.animation = `mesoFall ${duration}s ${delay}s linear forwards`;
      container.appendChild(coin);
      coin.addEventListener('animationend', () => coin.remove());
    }, i * 30);
  }
}

// ══════════════════════════════════════════
// 16. 초기화
// ══════════════════════════════════════════
function resetChecklist() {
  if (!activeMob || !confirm(`"${activeMob.name}" 진행도를 초기화할까요?`)) return;
  const store = loadS();
  delete store[`mob_${activeMob.id}`];
  saveS(store);
  renderItemGrid();
  renderSaves();
}

// ══════════════════════════════════════════
// 17. 저장된 도감작 칩
// ══════════════════════════════════════════
function renderSaves() {
  const store = loadS();
  const el = document.getElementById('saves-list');
  el.innerHTML = '';

  // mob_숫자 형태만 (mob_숫자_meta 등 제외)
  const keys = Object.keys(store).filter(k => /^mob_\d+$/.test(k));
  if (!keys.length) {
    el.innerHTML = '<span class="no-saves">아직 시작한 도감작이 없습니다.</span>'; return;
  }

  keys.forEach(key => {
    const mobId = parseInt(key.replace('mob_',''));
    const preset = PRESET.find(m => m.id === mobId);
    const savedName = (activeMob && activeMob.id === mobId)
      ? activeMob.name
      : (preset ? preset.name : (store[`mob_${mobId}_meta`]?.name || `#${mobId}`));
    const items  = store[key] || {};
    const excl   = new Set(store[`excl_${mobId}`] || []);
    const meta   = store[`mob_${mobId}_meta`] || {};
    let done, total;
    if (activeMob && activeMob.id === mobId) {
      const activeDrops = activeMob.drops.filter(d => !excl.has(d.id));
      total = activeDrops.length;
      done  = activeDrops.filter(d => (items[d.id]?.count||0) > 0).length;
    } else {
      const allTotal = meta.total || Object.keys(items).length;
      total = Math.max(1, allTotal - excl.size);
      done  = Math.min(total, Object.entries(items).filter(([id,s]) => !excl.has(Number(id)) && (s.count||0)>0).length);
    }
    const isAct  = activeMob && activeMob.id === mobId;
    const full   = total > 0 && done === total;
    const pct    = total > 0 ? Math.round(done / total * 100) : 0;

    const card = document.createElement('div');
    card.className = 'save-card' + (isAct ? ' act' : '') + (full ? ' complete' : '');
    const swSaved = store[`sw_mob_${mobId}`];
    const activeT = tabs.find(t => t.mob && t.mob.id === mobId);
    const elapsedMs = activeT ? swElapsed(activeT) : (swSaved?.base || 0);
    const elapsedStr = elapsedMs >= 1000 ? fmtTimeLog(elapsedMs) : '';
    card.innerHTML = `
      <button class="save-card-del" data-key="${key}" title="삭제">✕</button>
      <div class="save-card-name" title="${escHtml(savedName)}">${escHtml(savedName)}</div>
      <div class="save-card-pct">${pct}%</div>
      <div class="save-card-count">${done} / ${total}</div>
      <div class="save-card-bar-bg">
        <div class="save-card-bar-fill" style="width:${pct}%"></div>
      </div>
      ${elapsedStr ? `<div style="font-size:.6rem;color:#aaa;margin-top:5px">⏱ ${elapsedStr}</div>` : ''}
    `;
    card.addEventListener('click', e => {
      if (e.target.classList.contains('save-card-del')) {
        const k = e.target.dataset.key;
        if (confirm(`"${savedName}" 진행도를 삭제할까요?`)) {
          const s = loadS(); delete s[k]; saveS(s); renderSaves();
          if (activeMob && activeMob.id === mobId) renderItemGrid();
        }
        return;
      }
      // 이미 어떤 탭에 열려있으면 그 탭으로 전환
      const existingTab = tabs.find(t => t.mob && t.mob.id === mobId);
      if (existingTab) { switchTab(existingTab.idx); return; }
      // 현재 탭이 비어있으면 그냥 여기서 열기, 아니면 새 탭 추가
      if (activeTab().mob && tabs.length < MAX_TABS) addTab();
      if (preset) activateMob(preset);
      else fetchMobDrops(mobId, savedName, 0);
    });
    el.appendChild(card);
  });
}

// ══════════════════════════════════════════
// 18. 초기 실행
// ══════════════════════════════════════════
// 첫 번째 탭 패널 생성 (몹은 아직 없음, 섹션은 숨김)
(function() {
  const panel = buildTabPanel(tabs[0]);
  document.getElementById('tab-panels').appendChild(panel);
  panel.classList.add('active');
  renderTabBar();
})();
renderSaves();
</script>
